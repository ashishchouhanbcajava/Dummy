<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Login</title>

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: Arial, sans-serif;
		}

		body {
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			background: #f4f4f4;
		}

		.login-container {
			width: 350px;
			background: white;
			padding: 30px;
			border-radius: 10px;
			box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
		}

		.login-container h2 {
			text-align: center;
			margin-bottom: 20px;
		}

		.form-group {
			margin-bottom: 15px;
		}

		label {
			display: block;
			margin-bottom: 5px;
			font-weight: bold;
		}

		input {
			width: 100%;
			padding: 10px;
			border: 1px solid #ccc;
			border-radius: 5px;
		}

		button {
			width: 100%;
			padding: 10px;
			border: none;
			background: #007bff;
			color: white;
			font-size: 16px;
			border-radius: 5px;
			cursor: pointer;
		}

		button:hover {
			background: #0056b3;
		}
	</style>

</head>

<body>

	<div class="login-container">

		<h2>Login</h2>

		<form th:action="@{/login}" th:object="${users}" method="post">

			<div class="form-group">
				<label>Username</label>
				<input type="text" th:field="*{username}" placeholder="Enter Username">
			</div>

			<div class="form-group">
				<label>Password</label>
				<input type="password" th:field="*{password}" placeholder="Enter Password">
			</div>

			<button type="submit">Login</button>

		</form>

	</div>

</body>

</html>
